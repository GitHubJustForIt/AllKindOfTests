<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phantasialand-Roblox — Admin</title>
<link rel="stylesheet" href="style.css" />
<style>
  .admin-wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }
  .admin-header { text-align: center; margin-bottom: 34px; }
  .admin-header h1 { font-family: var(--font-display); color: var(--navy); font-size: 26px; margin: 0 0 6px; }
  .admin-header p { color: var(--text-secondary); font-size: 13px; margin: 0; }
  .admin-panel { display: none; }
  .admin-panel.show { display: block; }
  .pin-card { max-width: 360px; margin: 60px auto; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px 28px; text-align: center; }
  .pin-card h2 { font-family: var(--font-display); color: var(--navy); font-size: 20px; margin: 0 0 8px; }
  .pin-card p { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
  .admin-section { border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px; margin-bottom: 22px; }
  .admin-section h2 { font-family: var(--font-display); font-size: 17px; color: var(--navy); margin: 0 0 14px; }
  .inline-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 6px; }
  .inline-form .field { margin-bottom: 0; flex: 1; min-width: 130px; }
  .inline-form .btn { width: auto; flex: 0 0 auto; }
  .day-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 8px;
  }
  .day-row .dr-main { font-size: 13.5px; }
  .day-row .dr-main strong { display: block; font-family: var(--font-display); font-size: 15px; color: var(--navy); }
  .day-row .dr-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .booking-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); display: none; }
  .booking-list.show { display: block; }
  .booking-chip { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; padding: 6px 0; }
  .booking-chip button { border: none; background: none; color: var(--danger); font-weight: 700; cursor: pointer; font-size: 11.5px; }
  .empty-note { color: var(--text-tertiary); font-size: 13px; text-align: center; padding: 14px 0; }
  .session-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
  .session-status { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .session-status.open { background: #dff5e6; color: var(--success); }
  .session-status.closed { background: var(--paper-tint); color: var(--text-tertiary); }
</style>
</head>
<body>

  <div class="topbar wrap" style="max-width:920px; margin:0 auto;">
    <a class="pill-btn" href="index.html">← BACK TO SITE</a>
    <div class="brand">
      <span class="brand-main">Phantasialand</span>
      <span class="brand-sub">· ADMIN ·</span>
    </div>
    <span style="width:40px;"></span>
  </div>

  <main class="admin-wrap">

    <div id="pinGate">
      <div class="pin-card">
        <h2>Admin access</h2>
        <p>Enter the admin code to continue.</p>
        <div class="field">
          <div class="field-input-wrap"><input id="pinInput" type="password" placeholder="Admin code" autocomplete="off" /></div>
          <div id="pinHint" class="field-hint"></div>
        </div>
        <button class="btn btn-primary" id="pinSubmitBtn" type="button">Enter</button>
      </div>
    </div>

    <div class="admin-panel" id="adminPanel">
      <div class="admin-header">
        <h1>Admin Panel</h1>
        <p>Manage open days, bookings, daily sessions, and the ticket banner.</p>
      </div>

      <div class="admin-section">
        <h2>Open a new day</h2>
        <div class="inline-form">
          <div class="field">
            <label for="newDayDate">Date</label>
            <div class="field-input-wrap"><input id="newDayDate" type="text" placeholder="YYYY-MM-DD" /></div>
          </div>
          <div class="field">
            <label for="newDayCapacity">Capacity</label>
            <div class="field-input-wrap"><input id="newDayCapacity" type="number" min="1" value="5" /></div>
          </div>
          <button class="btn btn-primary btn-sm" id="addDayBtn" type="button">Save day</button>
        </div>
        <div id="addDayHint" class="field-hint"></div>
      </div>

      <div class="admin-section">
        <h2>Open days &amp; bookings</h2>
        <div id="daysList"></div>
      </div>

      <div class="admin-section">
        <h2>Ticket banner image</h2>
        <p style="font-size:12.5px; color:var(--text-secondary); margin-top:-6px;">This image shows at the top of every generated e-ticket.</p>
        <div class="inline-form">
          <div class="field">
            <label for="bannerUrlInput">Image URL</label>
            <div class="field-input-wrap"><input id="bannerUrlInput" type="url" placeholder="https://…" /></div>
          </div>
          <button class="btn btn-primary btn-sm" id="saveBannerBtn" type="button">Save</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="admin.js"></script>
</body>
</html>
